<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#1a130e"/>
<title>Recepten</title>
<style>
  :root{
    --bg1:#1a130e; --bg2:#221912;
    --card:#2a2018; --card2:#342820;
    --line:#43342a;
    --txt:#f6efe6; --muted:#b6a795;
    --accent:#e8734a; --accent-d:#c9552e;
    --green:#8bbf5a; --gold:#e7b64b;
    --ok:#5ec27a; --err:#e5645a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1100px 650px at 50% -12%, #2c2118 0%, var(--bg1) 55%) fixed;
    color:var(--txt); -webkit-font-smoothing:antialiased; overflow-x:hidden; min-height:100vh;
  }
  .app{max-width:640px; margin:0 auto; padding:16px 16px calc(28px + env(safe-area-inset-bottom));}
  .screen{display:none;}
  .screen.actief{display:block; animation:fade .18s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);}to{opacity:1; transform:none;}}

  header{display:flex; align-items:center; justify-content:space-between; gap:10px; margin:2px 0 14px;}
  .brand{display:flex; align-items:center; gap:10px; font-weight:800; font-size:22px; letter-spacing:.2px;}
  .brand .dot{width:30px; height:30px; border-radius:9px;
    background:linear-gradient(145deg,var(--accent),var(--accent-d)); display:flex; align-items:center;
    justify-content:center; font-size:17px; box-shadow:0 4px 12px rgba(232,115,74,.35);}
  .acts{display:flex; gap:8px;}

  .btn{border:1px solid var(--line); background:var(--card); color:var(--txt); border-radius:13px;
    padding:11px 15px; font-size:14px; font-weight:700; cursor:pointer; transition:.15s; text-align:center;}
  .btn:active{transform:scale(.96);}
  .btn.primary{background:linear-gradient(180deg,var(--accent),var(--accent-d)); border-color:var(--accent-d); color:#2a0f06;}
  .btn.ghost{background:transparent;}
  .btn.danger{background:transparent; border-color:#6b3a34; color:#f0928b;}
  .btn.small{padding:8px 11px; font-size:13px; border-radius:11px;}
  .btn.block{width:100%;}
  .btn[disabled]{opacity:.45; pointer-events:none;}
  .iconbtn{width:42px; height:42px; padding:0; font-size:19px; display:flex; align-items:center; justify-content:center;}

  input,textarea,select{
    width:100%; background:var(--bg2); border:1px solid var(--line); color:var(--txt);
    border-radius:12px; padding:12px 13px; font-size:15px; font-family:inherit; outline:none; transition:.15s;
  }
  input:focus,textarea:focus{border-color:var(--accent); background:#271d15;}
  textarea{resize:vertical; min-height:96px; line-height:1.5;}
  label{display:block; font-size:13px; color:var(--muted); margin:0 0 6px 2px; font-weight:600;}
  .veld{margin-bottom:14px;}
  .veld-rij{display:flex; gap:10px;}
  .veld-rij > *{flex:1;}

  /* Login */
  .login-wrap{max-width:340px; margin:14vh auto 0; text-align:center;}
  .login-wrap .logo{width:70px; height:70px; border-radius:20px; margin:0 auto 18px;
    background:linear-gradient(145deg,var(--accent),var(--accent-d)); display:flex; align-items:center;
    justify-content:center; font-size:36px; box-shadow:0 10px 30px rgba(232,115,74,.4);}
  .login-wrap h1{font-size:24px; margin:0 0 4px;}
  .login-wrap p{color:var(--muted); margin:0 0 24px; font-size:14px;}
  .pin-input{text-align:center; font-size:22px; letter-spacing:6px; font-weight:700;}

  /* Zoek + tags */
  .zoekbalk{position:relative; margin-bottom:12px;}
  .zoekbalk input{padding-left:40px;}
  .zoekbalk .ico{position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:16px; opacity:.6;}
  .tagbalk{display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:6px; scrollbar-width:none;}
  .tagbalk::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto; border:1px solid var(--line); background:var(--card); color:var(--muted);
    border-radius:999px; padding:7px 13px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:.15s;}
  .chip.actief{background:var(--accent); border-color:var(--accent); color:#2a0f06;}

  /* Kaarten */
  .lijst{display:flex; flex-direction:column; gap:12px;}
  .kaart{display:flex; gap:13px; background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--line); border-radius:18px; padding:12px; cursor:pointer; transition:.15s; align-items:center;}
  .kaart:active{transform:scale(.99);}
  .kaart .thumb{width:66px; height:66px; border-radius:13px; object-fit:cover; flex:0 0 auto; background:var(--bg2);
    display:flex; align-items:center; justify-content:center; font-size:28px;}
  .kaart .info{min-width:0; flex:1;}
  .kaart .info h3{margin:0 0 4px; font-size:16px; line-height:1.25; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .kaart .meta{font-size:12.5px; color:var(--muted); display:flex; gap:10px; flex-wrap:wrap;}
  .kaart .kaart-tags{margin-top:6px; display:flex; gap:6px; flex-wrap:wrap;}
  .minichip{font-size:11px; background:var(--bg2); border:1px solid var(--line); color:var(--muted);
    padding:2px 8px; border-radius:999px;}
  .bron-yt{color:var(--accent);}

  .leeg{text-align:center; color:var(--muted); padding:40px 20px; font-size:15px;}
  .leeg .em{font-size:44px; display:block; margin-bottom:10px;}

  /* Detail */
  .detail-hero{border-radius:20px; overflow:hidden; margin-bottom:14px; background:var(--card); border:1px solid var(--line);}
  .detail-hero img{width:100%; display:block; aspect-ratio:16/9; object-fit:cover;}
  .detail-hero .geen{aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; font-size:56px; opacity:.5;}
  h2.titel{font-size:24px; margin:0 0 8px; line-height:1.2;}
  .detail-meta{display:flex; gap:9px; flex-wrap:wrap; margin-bottom:16px;}
  .pill{background:var(--card); border:1px solid var(--line); border-radius:11px; padding:8px 12px; font-size:13px;}
  .pill b{display:block; color:var(--muted); font-weight:600; font-size:11px; margin-bottom:1px;}
  .blok{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:15px 16px; margin-bottom:14px;}
  .blok h4{margin:0 0 11px; font-size:15px; display:flex; align-items:center; gap:8px;}
  .ingr-lijst{list-style:none; margin:0; padding:0;}
  .ingr-lijst li{display:flex; gap:10px; padding:7px 0; border-bottom:1px solid var(--line); font-size:15px;}
  .ingr-lijst li:last-child{border-bottom:none;}
  .ingr-lijst .hv{color:var(--accent); font-weight:700; flex:0 0 auto; min-width:78px;}
  .stap-lijst{margin:0; padding:0; list-style:none; counter-reset:s;}
  .stap-lijst li{position:relative; padding:0 0 15px 40px; font-size:15px; line-height:1.5;}
  .stap-lijst li::before{counter-increment:s; content:counter(s); position:absolute; left:0; top:-1px;
    width:27px; height:27px; border-radius:9px; background:var(--accent); color:#2a0f06; font-weight:800;
    font-size:14px; display:flex; align-items:center; justify-content:center;}
  .stap-lijst li:not(:last-child)::after{content:""; position:absolute; left:13px; top:27px; bottom:2px; width:2px; background:var(--line);}
  .bron-link{color:var(--accent); text-decoration:none; font-size:14px; word-break:break-all;}

  /* Formulier ingrediënt-rijen */
  .ingr-rij{display:flex; gap:8px; margin-bottom:8px; align-items:center;}
  .ingr-rij .hv-in{flex:0 0 64px;}
  .ingr-rij .eh-in{flex:0 0 68px;}
  .ingr-rij .naam-in{flex:1;}
  .ingr-rij .weg{flex:0 0 auto; width:38px; height:38px; border-radius:10px; border:1px solid var(--line);
    background:transparent; color:var(--err); font-size:18px; cursor:pointer;}
  .form-acties{display:flex; gap:10px; margin-top:20px; position:sticky; bottom:0;
    padding:12px 0 calc(6px + env(safe-area-inset-bottom)); background:linear-gradient(0deg,var(--bg1) 72%,transparent);}
  .form-acties .btn{flex:1;}

  .topbar{display:flex; align-items:center; gap:12px; margin:2px 0 14px;}
  .topbar .terug{font-size:15px; color:var(--accent); background:none; border:none; cursor:pointer; padding:6px 0; font-weight:700;}
  .spacer{flex:1;}
  .soon{font-size:11px; background:var(--bg2); border:1px dashed var(--line); color:var(--muted); padding:3px 8px; border-radius:8px;}

  /* Toast */
  #toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); opacity:0;
    background:#332018; border:1px solid var(--line); color:var(--txt); padding:12px 18px; border-radius:13px;
    font-size:14px; font-weight:600; box-shadow:0 12px 30px rgba(0,0,0,.4); transition:.25s; pointer-events:none; z-index:50; max-width:90vw;}
  #toast.toon{opacity:1; transform:translateX(-50%) translateY(0);}
  #toast.err{border-color:var(--err); color:#ffd7d3;}

  .laden{text-align:center; color:var(--muted); padding:34px; font-size:15px;}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<section id="scherm-login" class="screen">
  <div class="app">
    <div class="login-wrap">
      <div class="logo">🍳</div>
      <h1>Receptenboek</h1>
      <p>Voer je PIN in om verder te gaan</p>
      <div class="veld">
        <input id="pin" class="pin-input" type="password" inputmode="numeric" placeholder="••••" autocomplete="off"/>
      </div>
      <button class="btn primary block" id="login-knop">Inloggen</button>
      <p id="config-waarschuwing" style="display:none; color:var(--err); margin-top:16px; font-size:13px;">
        ⚠️ Stel eerst <code>API_BASE</code> bovenaan in het script in.
      </p>
    </div>
  </div>
</section>

<!-- ===== LIJST ===== -->
<section id="scherm-lijst" class="screen">
  <div class="app">
    <header>
      <div class="brand"><span class="dot">🍳</span> Recepten</div>
      <div class="acts">
        <button class="btn iconbtn" id="import-knop" title="Importeer uit YouTube">▶</button>
        <button class="btn primary iconbtn" id="nieuw-knop" title="Nieuw recept">+</button>
        <button class="btn ghost iconbtn" id="uitlog-knop" title="Uitloggen">⏻</button>
      </div>
    </header>

    <div class="zoekbalk">
      <span class="ico">🔍</span>
      <input id="zoek" type="search" placeholder="Zoek op titel of ingrediënt…" autocomplete="off"/>
    </div>
    <div class="tagbalk" id="tagbalk"></div>

    <div class="lijst" id="lijst"></div>
  </div>
</section>

<!-- ===== DETAIL ===== -->
<section id="scherm-detail" class="screen">
  <div class="app">
    <div class="topbar">
      <button class="terug" id="detail-terug">‹ Terug</button>
      <div class="spacer"></div>
      <button class="btn ghost small" id="detail-bewerk">Bewerken</button>
      <button class="btn danger small" id="detail-verwijder">Verwijderen</button>
    </div>
    <div id="detail-inhoud"></div>
  </div>
</section>

<!-- ===== FORMULIER ===== -->
<section id="scherm-form" class="screen">
  <div class="app">
    <div class="topbar">
      <button class="terug" id="form-terug">‹ Annuleren</button>
      <div class="spacer"></div>
      <h3 id="form-titel" style="margin:0; font-size:17px;">Nieuw recept</h3>
    </div>

    <div class="veld">
      <label>Titel *</label>
      <input id="f-titel" type="text" placeholder="bv. Pasta pesto"/>
    </div>

    <div class="veld veld-rij">
      <div><label>Porties</label><input id="f-porties" type="text" placeholder="4"/></div>
      <div><label>Bereidingstijd</label><input id="f-bereidingstijd" type="text" placeholder="15 min"/></div>
      <div><label>Kooktijd</label><input id="f-kooktijd" type="text" placeholder="20 min"/></div>
    </div>

    <div class="veld">
      <label>Ingrediënten</label>
      <div id="ingr-rows"></div>
      <button class="btn ghost small" id="ingr-toevoegen" type="button">+ Ingrediënt</button>
    </div>

    <div class="veld">
      <label>Bereidingswijze — één stap per regel</label>
      <textarea id="f-stappen" placeholder="Kook de pasta beetgaar.&#10;Meng de pesto erdoor.&#10;…"></textarea>
    </div>

    <div class="veld">
      <label>Benodigdheden — komma-gescheiden</label>
      <input id="f-benodigdheden" type="text" placeholder="pan, vergiet"/>
    </div>

    <div class="veld">
      <label>Tags — komma-gescheiden</label>
      <input id="f-tags" type="text" placeholder="snel, vegetarisch"/>
    </div>

    <div class="veld">
      <label>Bron-URL (optioneel)</label>
      <input id="f-bron" type="url" placeholder="https://…"/>
    </div>

    <div class="veld">
      <label>Notities</label>
      <textarea id="f-notities" placeholder="Eigen aantekeningen…" style="min-height:70px;"></textarea>
    </div>

    <div class="form-acties">
      <button class="btn ghost" id="form-annuleren">Annuleren</button>
      <button class="btn primary" id="form-bewaren">Opslaan</button>
    </div>
  </div>
</section>

<div id="toast"></div>

<script>
// ===================================================================
//  CONFIG — pas dit aan na het deployen van de Worker
// ===================================================================
const API_BASE = "https://recepten-api.kerkapp.workers.dev";
// ===================================================================

const TOKEN_KEY = "recepten_token";
let RECEPTEN = [];        // cache
let ACTIEF_FILTER = "";   // geselecteerde tag
let BEWERK_ID = null;     // id bij bewerken, anders null

const el = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

// ---------- token / api ----------
const getToken = () => localStorage.getItem(TOKEN_KEY) || "";
const setToken = (t) => t ? localStorage.setItem(TOKEN_KEY, t) : localStorage.removeItem(TOKEN_KEY);

async function api(path, opts = {}) {
  const headers = Object.assign({ "Content-Type": "application/json" }, opts.headers || {});
  const t = getToken();
  if (t) headers["Authorization"] = "Bearer " + t;
  let res;
  try {
    res = await fetch(API_BASE + path, Object.assign({}, opts, { headers }));
  } catch (e) {
    throw new Error("Geen verbinding met de server.");
  }
  if (res.status === 401) {
    setToken("");
    toonScherm("login");
    throw new Error("Sessie verlopen — log opnieuw in.");
  }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.fout || ("Fout " + res.status));
  return data;
}

// ---------- schermen ----------
function toonScherm(naam) {
  document.querySelectorAll(".screen").forEach((s) => s.classList.remove("actief"));
  el("scherm-" + naam).classList.add("actief");
  window.scrollTo(0, 0);
}

function toast(msg, isErr = false) {
  const t = el("toast");
  t.textContent = msg;
  t.className = "toon" + (isErr ? " err" : "");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => (t.className = ""), 2800);
}

// ---------- login ----------
async function doeLogin() {
  const pin = el("pin").value.trim();
  if (!pin) return toast("Voer je PIN in", true);
  el("login-knop").disabled = true;
  try {
    const { token } = await api("/api/login", { method: "POST", body: JSON.stringify({ pin }) });
    setToken(token);
    el("pin").value = "";
    await naarLijst();
  } catch (e) {
    toast(e.message, true);
  } finally {
    el("login-knop").disabled = false;
  }
}

// ---------- lijst ----------
async function naarLijst() {
  toonScherm("lijst");
  el("lijst").innerHTML = '<div class="laden">Laden…</div>';
  try {
    RECEPTEN = await api("/api/recepten");
    renderTags();
    renderLijst();
  } catch (e) {
    el("lijst").innerHTML = '<div class="leeg"><span class="em">⚠️</span>' + esc(e.message) + "</div>";
  }
}

function alleTags() {
  const set = new Set();
  RECEPTEN.forEach((r) => (r.tags || []).forEach((t) => set.add(t)));
  return [...set].sort((a, b) => a.localeCompare(b, "nl"));
}

function renderTags() {
  const tags = alleTags();
  const box = el("tagbalk");
  if (!tags.length) { box.innerHTML = ""; return; }
  let html = `<span class="chip ${ACTIEF_FILTER ? "" : "actief"}" data-tag="">Alles</span>`;
  html += tags.map((t) =>
    `<span class="chip ${ACTIEF_FILTER === t ? "actief" : ""}" data-tag="${esc(t)}">${esc(t)}</span>`
  ).join("");
  box.innerHTML = html;
  box.querySelectorAll(".chip").forEach((c) =>
    c.addEventListener("click", () => { ACTIEF_FILTER = c.dataset.tag; renderTags(); renderLijst(); }));
}

function renderLijst() {
  const zoek = el("zoek").value.trim().toLowerCase();
  let items = RECEPTEN.slice();
  if (ACTIEF_FILTER) items = items.filter((r) => (r.tags || []).includes(ACTIEF_FILTER));
  if (zoek) {
    items = items.filter((r) => {
      const inTitel = (r.titel || "").toLowerCase().includes(zoek);
      const inIngr = (r.ingredienten || []).some((i) => (i.naam || "").toLowerCase().includes(zoek));
      return inTitel || inIngr;
    });
  }
  const box = el("lijst");
  if (!RECEPTEN.length) {
    box.innerHTML = '<div class="leeg"><span class="em">📖</span>Nog geen recepten.<br>Voeg er één toe met <b>+</b>.</div>';
    return;
  }
  if (!items.length) {
    box.innerHTML = '<div class="leeg"><span class="em">🔍</span>Niets gevonden.</div>';
    return;
  }
  box.innerHTML = items.map((r) => {
    const thumb = r.afbeelding
      ? `<img class="thumb" src="${esc(r.afbeelding)}" alt="" loading="lazy"/>`
      : `<div class="thumb">🍽️</div>`;
    const meta = [];
    if (r.porties) meta.push("🍽️ " + esc(r.porties));
    if (r.bereidingstijd) meta.push("⏱️ " + esc(r.bereidingstijd));
    if (r.bron_type === "youtube") meta.push('<span class="bron-yt">▶ YouTube</span>');
    const tags = (r.tags || []).slice(0, 3)
      .map((t) => `<span class="minichip">${esc(t)}</span>`).join("");
    return `<div class="kaart" data-id="${esc(r.id)}">
      ${thumb}
      <div class="info">
        <h3>${esc(r.titel)}</h3>
        <div class="meta">${meta.join("")}</div>
        ${tags ? `<div class="kaart-tags">${tags}</div>` : ""}
      </div>
    </div>`;
  }).join("");
  box.querySelectorAll(".kaart").forEach((k) =>
    k.addEventListener("click", () => openDetail(k.dataset.id)));
}

// ---------- detail ----------
async function openDetail(id) {
  try {
    const r = await api("/api/recepten/" + id);
    renderDetail(r);
    toonScherm("detail");
  } catch (e) {
    toast(e.message, true);
  }
}

function renderDetail(r) {
  el("detail-bewerk").onclick = () => openFormulier(r);
  el("detail-verwijder").onclick = () => verwijder(r);

  const hero = r.afbeelding
    ? `<div class="detail-hero"><img src="${esc(r.afbeelding)}" alt=""/></div>`
    : `<div class="detail-hero"><div class="geen">🍽️</div></div>`;

  const meta = [];
  if (r.porties) meta.push(`<div class="pill"><b>Porties</b>${esc(r.porties)}</div>`);
  if (r.bereidingstijd) meta.push(`<div class="pill"><b>Bereiden</b>${esc(r.bereidingstijd)}</div>`);
  if (r.kooktijd) meta.push(`<div class="pill"><b>Koken</b>${esc(r.kooktijd)}</div>`);

  const ingr = (r.ingredienten || []).length
    ? `<div class="blok"><h4>🧂 Ingrediënten</h4><ul class="ingr-lijst">` +
      r.ingredienten.map((i) => {
        const hv = [i.hoeveelheid, i.eenheid].filter(Boolean).join(" ");
        const opm = i.opmerking ? ` <span style="color:var(--muted)">(${esc(i.opmerking)})</span>` : "";
        return `<li><span class="hv">${esc(hv) || "&nbsp;"}</span><span>${esc(i.naam)}${opm}</span></li>`;
      }).join("") + `</ul></div>`
    : "";

  const benod = (r.benodigdheden || []).length
    ? `<div class="blok"><h4>🍴 Benodigdheden</h4><div style="display:flex;gap:8px;flex-wrap:wrap;">` +
      r.benodigdheden.map((b) => `<span class="minichip">${esc(b)}</span>`).join("") + `</div></div>`
    : "";

  const stappen = (r.stappen || []).length
    ? `<div class="blok"><h4>👩‍🍳 Bereidingswijze</h4><ol class="stap-lijst">` +
      r.stappen.map((s) => `<li>${esc(s)}</li>`).join("") + `</ol></div>`
    : "";

  const tags = (r.tags || []).length
    ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">` +
      r.tags.map((t) => `<span class="minichip">${esc(t)}</span>`).join("") + `</div>`
    : "";

  const notities = r.notities
    ? `<div class="blok"><h4>📝 Notities</h4><div style="white-space:pre-wrap;line-height:1.5;">${esc(r.notities)}</div></div>`
    : "";

  const bron = r.bron_url
    ? `<div class="blok"><h4>🔗 Bron</h4><a class="bron-link" href="${esc(r.bron_url)}" target="_blank" rel="noopener">${esc(r.bron_url)}</a></div>`
    : "";

  el("detail-inhoud").innerHTML =
    hero +
    `<h2 class="titel">${esc(r.titel)}</h2>` +
    (meta.length ? `<div class="detail-meta">${meta.join("")}</div>` : "") +
    tags + ingr + benod + stappen + notities + bron;
}

async function verwijder(r) {
  if (!confirm(`"${r.titel}" verwijderen?`)) return;
  try {
    await api("/api/recepten/" + r.id, { method: "DELETE" });
    toast("Verwijderd");
    await naarLijst();
  } catch (e) {
    toast(e.message, true);
  }
}

// ---------- formulier ----------
function ingrRij(ingr = {}) {
  const div = document.createElement("div");
  div.className = "ingr-rij";
  div.innerHTML =
    `<input class="hv-in" type="text" placeholder="200" value="${esc(ingr.hoeveelheid || "")}"/>` +
    `<input class="eh-in" type="text" placeholder="g" value="${esc(ingr.eenheid || "")}"/>` +
    `<input class="naam-in" type="text" placeholder="bloem" value="${esc(ingr.naam || "")}"/>` +
    `<button class="weg" type="button" title="Verwijder">×</button>`;
  div.querySelector(".weg").addEventListener("click", () => div.remove());
  return div;
}

function openFormulier(r = null) {
  BEWERK_ID = r ? r.id : null;
  el("form-titel").textContent = r ? "Recept bewerken" : "Nieuw recept";
  el("f-titel").value = r?.titel || "";
  el("f-porties").value = r?.porties || "";
  el("f-bereidingstijd").value = r?.bereidingstijd || "";
  el("f-kooktijd").value = r?.kooktijd || "";
  el("f-stappen").value = (r?.stappen || []).join("\n");
  el("f-benodigdheden").value = (r?.benodigdheden || []).join(", ");
  el("f-tags").value = (r?.tags || []).join(", ");
  el("f-bron").value = r?.bron_url || "";
  el("f-notities").value = r?.notities || "";

  const rows = el("ingr-rows");
  rows.innerHTML = "";
  const ingr = r?.ingredienten?.length ? r.ingredienten : [{}];
  ingr.forEach((i) => rows.appendChild(ingrRij(i)));

  toonScherm("form");
}

function leesFormulier() {
  const splitKomma = (v) => v.split(",").map((s) => s.trim()).filter(Boolean);
  const splitRegel = (v) => v.split("\n").map((s) => s.trim()).filter(Boolean);
  const ingredienten = [...el("ingr-rows").querySelectorAll(".ingr-rij")].map((rij) => ({
    hoeveelheid: rij.querySelector(".hv-in").value.trim(),
    eenheid: rij.querySelector(".eh-in").value.trim(),
    naam: rij.querySelector(".naam-in").value.trim(),
  })).filter((i) => i.naam);
  return {
    titel: el("f-titel").value.trim(),
    porties: el("f-porties").value.trim(),
    bereidingstijd: el("f-bereidingstijd").value.trim(),
    kooktijd: el("f-kooktijd").value.trim(),
    ingredienten,
    stappen: splitRegel(el("f-stappen").value),
    benodigdheden: splitKomma(el("f-benodigdheden").value),
    tags: splitKomma(el("f-tags").value),
    bron_url: el("f-bron").value.trim(),
    notities: el("f-notities").value.trim(),
    bron_type: BEWERK_ID
      ? (RECEPTEN.find((x) => x.id === BEWERK_ID)?.bron_type || "handmatig")
      : "handmatig",
  };
}

async function bewaar() {
  const recept = leesFormulier();
  if (!recept.titel) return toast("Titel is verplicht", true);
  el("form-bewaren").disabled = true;
  try {
    if (BEWERK_ID) {
      await api("/api/recepten/" + BEWERK_ID, { method: "PUT", body: JSON.stringify(recept) });
      toast("Opgeslagen");
    } else {
      await api("/api/recepten", { method: "POST", body: JSON.stringify(recept) });
      toast("Recept toegevoegd");
    }
    await naarLijst();
  } catch (e) {
    toast(e.message, true);
  } finally {
    el("form-bewaren").disabled = false;
  }
}

// ---------- events ----------
el("login-knop").addEventListener("click", doeLogin);
el("pin").addEventListener("keydown", (e) => { if (e.key === "Enter") doeLogin(); });
el("nieuw-knop").addEventListener("click", () => openFormulier(null));
el("uitlog-knop").addEventListener("click", () => { setToken(""); toonScherm("login"); });
el("import-knop").addEventListener("click", () =>
  toast("YouTube-import komt in Fase 2 🎬"));
el("zoek").addEventListener("input", renderLijst);
el("detail-terug").addEventListener("click", naarLijst);
el("form-terug").addEventListener("click", () => BEWERK_ID ? openDetail(BEWERK_ID) : naarLijst());
el("form-annuleren").addEventListener("click", () => BEWERK_ID ? openDetail(BEWERK_ID) : naarLijst());
el("form-bewaren").addEventListener("click", bewaar);
el("ingr-toevoegen").addEventListener("click", () => el("ingr-rows").appendChild(ingrRij()));

// ---------- init ----------
(function init() {
  if (API_BASE.includes("JOUW-SUBDOMEIN")) {
    el("config-waarschuwing").style.display = "block";
  }
  if (getToken()) naarLijst();
  else toonScherm("login");
})();
</script>
</body>
</html>
